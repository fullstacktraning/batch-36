<!DOCTYPE html>
<html>
    <head>
        <title>Images</title>
        <style>
            img{
                border: 1px solid red;
                padding: 20px;
                border-radius: 30px;
                margin: 20px;   
            }
            .c1:hover{
                border: 10px solid orange;
            }
            .c2:hover{
                width: 150px;
                height: 150px;
                border: 5px solid green;
                border-radius: 100%;
            }
            .c3:hover{
                display: none;
            }
        </style>
    </head>
    <body>
        <img src="flipkart.png" alt="Flipkart" class="c1">
        <img src="amazon.jpeg" alt="Amazon" class="c2">
        <img src="myntra.png" alt="Myntra" class="c3">
    </body>
</html>
