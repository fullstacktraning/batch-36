<!DOCTYPE html>
<html>
    <head>
        <title>Marquee - Example</title>
    </head>
    <body>
        
        <marquee>
            <h1>HTML</h1>
        </marquee>

        <marquee direction="right">
            <h1>HTML</h1>
        </marquee>

        <marquee direction="up">
            <h1>HTML</h1>
        </marquee>

        <marquee direction="down">
            <h1>HTML</h1>
        </marquee>

        <marquee width="50%">
            <h1>HTML</h1>
        </marquee>

        <marquee scrollamount="500">
            <h1>HTML</h1>
        </marquee>

        
        
    </body>
</html>
